services:
  moxible:
    container_name: moxible
    build:
      context: ..
      dockerfile: web/Dockerfile
    image: moxible:latest
    ports:
      - "4080:4080"
    volumes:
      # Single bind mount. Wizard writes /data/config.yml + /data/keys/ here.
      # NEVER mount the host's ~/.ssh — the container generates its own key.
      - ./data:/data
    environment:
      NODE_ENV: production
      PORT: 4080
      HOST: 0.0.0.0
      BIND_ADDR: 0.0.0.0
      ORIGIN: http://localhost:4080
      ALLOWED_ORIGINS: http://localhost:4080
      ANSIBLE_DIR: /repo/ansible
      DATA_DIR: /data
      KEYS_DIR: /data/keys
      ARTIFACTS_DIR: /data/runs
      ANSIBLE_CONFIG: /repo/ansible/ansible.cfg
      ANSIBLE_CALLBACK_PLUGINS: /app/ansible-callbacks
      ANSIBLE_COLLECTIONS_PATH: /usr/share/ansible/collections
      # Phase 1.5 fallback knobs (the wizard replaces these in Phase 2+).
      # Leave unset to use defaults baked into runner.ts / the playbooks.
      # PVE_HOST: 192.0.2.10
      # PVE_USER: root
      # PVE_BASTION: ""
      # SSH_KEY_PATH: /data/keys/id_ed25519_pve
      # DEFAULT_PUBKEY_PATH: /data/keys/id_ed25519_pve.pub
      # CLOUD_USER: admin
      # SUBNET_PREFIX: 192.0.2
      # NETWORK_GATEWAY: 192.0.2.1
      # CIDR_PREFIX: "24"
      # DNS_SERVERS: "1.1.1.1 8.8.8.8"
      # NETWORK_BRIDGE: vmbr0
      # VM_STORAGE: local-lvm
      # SNIPPETS_STORAGE: local
      # TEMPLATE_VMID: "9000"
      # CRITICAL_VMIDS: ""
      # DOTFILES_URL: ""
    restart: unless-stopped
