---
# Rolling apt upgrade across guests. Opt-in: a host runs only if it carries the
# `auto_patch` group var or tag. Reboots are sequential (serial:1) to keep at
# most one guest down at a time.
#
# Dry-run:   ansible-playbook playbooks/patch.yml --check --diff
# Live run:  ansible-playbook playbooks/patch.yml --limit auto_patch
- name: Guest OS patching
  hosts: auto_patch
  become: true
  serial: 1
  gather_facts: true

  pre_tasks:
    - name: Snapshot guest before upgrade (PVE-side)
      delegate_to: pve
      run_once: false
      ansible.builtin.command:
        cmd: "qm snapshot {{ vmid }} preupgrade-{{ ansible_date_time.iso8601_basic_short }} --description 'auto patch.yml'"
      when: vmid is defined and guest_type | default('vm') == 'vm'
      changed_when: true

  tasks:
    - name: apt update + upgrade
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        autoremove: true
        autoclean: true
      register: apt_result

    - name: Detect kernel/init reboot requirement
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Reboot if required
      ansible.builtin.reboot:
        msg: "ansible patch.yml triggered reboot"
        connect_timeout: 5
        reboot_timeout: 600
        pre_reboot_delay: 5
        post_reboot_delay: 30
        test_command: uptime
      when: reboot_required.stat.exists
