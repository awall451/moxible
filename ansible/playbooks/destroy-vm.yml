---
# Stop + destroy one or more VMs. Critical-VMID protection: any VMID listed
# in `protection.critical_vmids` (Phase 2+ wizard config) or the CRITICAL_VMIDS
# env var (Phase 1.5 fallback, comma-separated, e.g. "202,210") hard-fails
# the destroy.
#
# Usage:
#   ansible-playbook playbooks/destroy-vm.yml -e vmid=204
#   ansible-playbook playbooks/destroy-vm.yml -e 'vmids=[204,205]'
#
# The playbook only acts on vmids that exist; non-existent ones are skipped.

- name: Destroy VMs
  hosts: pve
  become: true
  gather_facts: false

  vars:
    # Resolve a single -e vmid=N OR a list -e 'vmids=[a,b]' into a uniform list.
    vmid_list: "{{ vmids | default([vmid] if (vmid is defined) else []) }}"
    # Phase 1.5: env-var fallback. Phase 2+ wizard puts these in /data/config.yml.
    critical_vmids: >-
      {{ (lookup('env', 'CRITICAL_VMIDS') | default('', true)).split(',')
         | map('trim') | reject('equalto', '') | map('int') | list }}

  pre_tasks:
    - ansible.builtin.import_tasks: ../tasks/load_config.yml

  tasks:
    - name: Sanity — at least one VMID requested
      ansible.builtin.assert:
        that: vmid_list | length > 0
        fail_msg: "Pass -e vmid=<N> or -e 'vmids=[a,b,c]'."

    - name: Critical VMID protection — refuse destroy on protected VMIDs
      ansible.builtin.assert:
        that: (vmid_list | map('int') | list) | intersect(critical_vmids) | length == 0
        fail_msg: >-
          Refusing to destroy: {{ (vmid_list | map('int') | list) | intersect(critical_vmids) }}
          is in critical_vmids ({{ critical_vmids }}). Remove from protection list first.

    - name: Probe each VMID
      ansible.builtin.command:
        cmd: "qm status {{ item }}"
      register: probe
      failed_when: false
      changed_when: false
      loop: "{{ vmid_list }}"

    - name: Build exists map
      ansible.builtin.set_fact:
        vm_exists: "{{ vm_exists | default({}) | combine({item.item: item.rc == 0}) }}"
      loop: "{{ probe.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Stop running VMs (graceful first via shutdown)
      ansible.builtin.command:
        cmd: "qm shutdown {{ item }} --timeout 30 --forceStop 1"
      loop: "{{ vmid_list }}"
      when: vm_exists[item]
      register: shutdown_result
      failed_when:
        - shutdown_result.rc is defined
        - shutdown_result.rc != 0
        - "'is not running' not in (shutdown_result.stderr | default(''))"

    - name: Destroy
      ansible.builtin.command:
        cmd: "qm destroy {{ item }} --purge 1 --skiplock 0"
      loop: "{{ vmid_list }}"
      when: vm_exists[item]

    - name: Confirm gone
      ansible.builtin.command:
        cmd: "qm status {{ item }}"
      register: post_check
      failed_when: false
      changed_when: false
      loop: "{{ vmid_list }}"

    - name: Report
      ansible.builtin.debug:
        msg: "VMID {{ item.item }} -> {{ 'destroyed' if item.rc != 0 else 'STILL EXISTS' }}"
      loop: "{{ post_check.results }}"
      loop_control:
        label: "{{ item.item }}"
