---
# One-time bootstrap: download Ubuntu's cloud image, import it as a Proxmox
# template (VMID 9000). Subsequent `create-vm-from-template.yml` runs clone
# from this template and apply per-VM cloud-init in seconds.
#
# Run this whenever you want to (re)build the template — e.g. when Ubuntu
# publishes a newer 24.04.x point release.
#
# Usage:
#   ansible-playbook playbooks/build-cloud-template.yml --check --diff
#   ansible-playbook playbooks/build-cloud-template.yml
#
# Idempotent: re-runs are safe. The download skips if the file is up-to-date,
# the import skips if the disk already exists, and `qm template` is a no-op
# on an already-templated VM.

- name: Build Ubuntu 24.04 cloud-init template (VMID 9000)
  hosts: pve
  become: true
  gather_facts: false

  vars:
    template_vmid: "{{ lookup('env', 'TEMPLATE_VMID') | default('9000', true) | int }}"
    template_name: "ubuntu-24.04-cloudinit-tpl"
    template_storage: "{{ lookup('env', 'VM_STORAGE') | default('local-lvm', true) }}"
    network_bridge: "{{ lookup('env', 'NETWORK_BRIDGE') | default('vmbr0', true) }}"

    # Ubuntu cloud images publish a "current" pointer that always tracks the
    # latest 24.04.x point release. Switch to a pinned URL if you ever need
    # bit-stable rebuilds.
    cloud_image_url: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
    cloud_image_sha_url: "https://cloud-images.ubuntu.com/noble/current/SHA256SUMS"
    cloud_image_local: "/var/lib/vz/template/iso/noble-server-cloudimg-amd64.img"
    cloud_image_filename: "noble-server-cloudimg-amd64.img"

  tasks:

    # ---- 1. Fetch the cloud image and verify its SHA256 ---------------------
    - name: Download Ubuntu cloud image (skip if up-to-date)
      ansible.builtin.get_url:
        url: "{{ cloud_image_url }}"
        dest: "{{ cloud_image_local }}"
        mode: "0644"
        timeout: 60
      register: image_download

    - name: Fetch upstream SHA256SUMS
      ansible.builtin.get_url:
        url: "{{ cloud_image_sha_url }}"
        dest: "/tmp/noble-cloudimg.SHA256SUMS"
        mode: "0644"
        timeout: 30
        force: true

    - name: Extract expected SHA256 for our image
      ansible.builtin.shell: >-
        grep ' \*\?{{ cloud_image_filename }}$' /tmp/noble-cloudimg.SHA256SUMS | awk '{print $1}'
      register: expected_sha
      changed_when: false

    - name: Compute downloaded SHA256
      ansible.builtin.stat:
        path: "{{ cloud_image_local }}"
        get_checksum: true
        checksum_algorithm: sha256
      register: image_stat

    - name: Verify SHA256 of cloud image
      ansible.builtin.assert:
        that:
          - expected_sha.stdout | length == 64
          - image_stat.stat.checksum == expected_sha.stdout
        fail_msg: >-
          Cloud image SHA mismatch.
          Expected: {{ expected_sha.stdout }}
          Got:      {{ image_stat.stat.checksum }}
        success_msg: "Cloud image SHA verified ({{ image_stat.stat.checksum[:12] }}…)"

    # ---- 2. Probe whether template already exists ---------------------------
    - name: Probe template VMID
      ansible.builtin.command:
        cmd: "qm status {{ template_vmid }}"
      register: tpl_status
      failed_when: false
      changed_when: false

    - name: Set fact — template exists?
      ansible.builtin.set_fact:
        template_exists: "{{ tpl_status.rc == 0 }}"

    # ---- 3. Build the template if missing -----------------------------------
    - name: Create template VM shell
      ansible.builtin.command:
        cmd: >-
          qm create {{ template_vmid }}
            --name {{ template_name }}
            --memory 2048
            --cores 2
            --sockets 1
            --net0 virtio,bridge={{ network_bridge }},firewall=1
            --ostype l26
            --scsihw virtio-scsi-single
            --bios seabios
            --machine q35
            --agent enabled=1
            --serial0 socket
            --vga serial0
            --cpu host
      when: not template_exists

    - name: Import cloud image as a disk on {{ template_storage }}
      ansible.builtin.command:
        cmd: "qm importdisk {{ template_vmid }} {{ cloud_image_local }} {{ template_storage }}"
      when: not template_exists
      changed_when: true

    - name: Attach imported disk as scsi0 (with discard + ssd flags)
      ansible.builtin.command:
        cmd: >-
          qm set {{ template_vmid }}
            --scsi0 {{ template_storage }}:vm-{{ template_vmid }}-disk-0,iothread=1,discard=on,ssd=1
      when: not template_exists

    - name: Add cloud-init drive on ide2
      ansible.builtin.command:
        cmd: "qm set {{ template_vmid }} --ide2 {{ template_storage }}:cloudinit"
      when: not template_exists

    - name: Set boot order (disk only — no ISO)
      ansible.builtin.command:
        cmd: "qm set {{ template_vmid }} --boot order=scsi0"
      when: not template_exists

    - name: Convert VM into a template
      ansible.builtin.command:
        cmd: "qm template {{ template_vmid }}"
      when: not template_exists

    # ---- 4. Show resulting config -------------------------------------------
    - name: Read final template config
      ansible.builtin.command:
        cmd: "qm config {{ template_vmid }}"
      register: tpl_config
      changed_when: false

    - name: Show template config
      ansible.builtin.debug:
        var: tpl_config.stdout_lines
